<div class="albums-container">
    <h1>Albums</h1>
    
    <div *ngIf="loading" class="loading">
        Loading...
    </div>

    <div *ngIf="!loading && albums.length === 0" class="empty">
        No avialble albums
    </div>

    <div class="albums-grid" *ngIf="!loading && albums.length > 0">
        <div *ngFor="let album of albums" class="album-card">
            <div class="album-info" [routerLink]="['/albums', album.id]">
                <span class="album-id">ID: {{ album.id }}</span>
                <h3>{{ album.title }}</h3>
            </div>
            <button (click)="deleteAlbum(album.id)" class="delete-btn">Delete</button>
        </div>
    </div>
</div>
