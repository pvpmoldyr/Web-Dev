<div class="detail-container">
    <button class="back-btn" (click)="goBack()">← Back to Albums</button>

    <div *ngIf="loading" class="loading">
        Loading...
    </div>

    <div *ngIf="!loading && album" class="album-detail">
        <h1>Details </h1>
        
        <div class="info">
            <p><strong>ID:</strong> {{ album.id }}</p>
            <p><strong>User ID:</strong> {{ album.userId }}</p>
            
            <div class="edit-title">
                <label><strong>Name:</strong></label>
                <input 
                    [(ngModel)]="editedTitle" 
                    [placeholder]="album.title"
                    class="title-input">
            </div>

            <div class="actions">
                <button 
                    (click)="saveTitle()" 
                    class="save-btn"
                    [disabled]="!editedTitle || editedTitle === album.title">
                    Save
                </button>
                
                <a [routerLink]="['photos']" class="photos-link">
                    See photo
                </a>
            </div>
        </div>
    </div>
</div>
